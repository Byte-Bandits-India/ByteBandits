name: Deploy Next.js to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 13.232.158.86
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 22
          command_timeout: 20m
          script: |
            set -e

            # Enable Swap space if it doesn't exist to prevent OOM freezes
            if [ $(free -m | awk '/^Swap:/{print $2}') -eq 0 ]; then
              echo "No active Swap detected. Checking for /swapfile..."
              if [ ! -f /swapfile ]; then
                echo "Creating 2G Swap file..."
                sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
                sudo chmod 600 /swapfile
                sudo mkswap /swapfile
              fi
              echo "Activating Swap file..."
              sudo swapon /swapfile
            fi

            git config --global --add safe.directory /home/ec2-user/byteBandits

            cd /home/ec2-user/byteBandits

            # Check if .git directory exists, if not clone the repo
            if [ ! -d .git ]; then
              echo "Git repository not found. Cloning repository..."
              cd /home/ec2-user
              rm -rf byteBandits
              git clone https://github.com/Byte-Bandits-India/ByteBandits.git byteBandits
              cd byteBandits
            fi

            echo "Pulling latest code..."
            git pull origin main

            # Copy environment variables from host home directory if present
            if [ -f /home/ec2-user/.env.local ]; then
              echo "Copying environment variables from /home/ec2-user/.env.local..."
              cp /home/ec2-user/.env.local .env.local
            else
              echo "WARNING: /home/ec2-user/.env.local not found. Mail may not work without SMTP variables configured."
            fi

            echo "Installing dependencies..."
            npm ci --legacy-peer-deps --prefer-offline --no-audit --no-fund

            echo "Building project..."
            NODE_OPTIONS="--max-old-space-size=1024" npm run build

            echo "Fixing permissions..."
            chmod -R 755 .next public

            echo "Restarting app..."
            pm2 restart byteBandits || pm2 start npm --name "byteBandits" -- start

            pm2 save

            echo "Deployment complete"